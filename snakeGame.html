<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Snake</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #030d06;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Space Mono', monospace;
  color: #d4fde4;
}
h1 { color:#00ff80; margin-bottom:8px; font-size:1.4rem; letter-spacing:0.1em; }
p { color:rgba(212,253,228,0.5); font-size:0.75rem; margin-bottom:12px; text-align:center; }
canvas {
  display: block;
  background: rgba(0,255,100,0.04);
  border: 1px solid rgba(0,255,100,0.25);
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,255,100,0.1);
}
#score {
  margin-top: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  color: #00ff80;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
<h1>🐍 Snake</h1>
<p>Arrow keys / WASD / HJKL to move · Space to restart</p>
<canvas id="the-game" width="320" height="240"></canvas>
<div id="score">Score: 0</div>
<script src="snake.js"></script>
<script>
  // Update score display after game initialises
  document.addEventListener("DOMContentLoaded", function() {
    setInterval(function() {
      if(typeof game !== 'undefined') {
        document.getElementById('score').textContent = 'Score: ' + game.score;
      }
    }, 100);
  });
</script>
</body>
</html>
