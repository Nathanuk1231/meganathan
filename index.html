<body>

<div id="announcementBar"></div>
<div id="streakBanner"></div>

<nav class="nav">

  <a onclick="app.showPage('chat')" id="nav-chat"><span>Chat</span></a>

  </div>

<div id="toast"></div>
<div id="lb" onclick="this.classList.remove('open')"><img id="lbImg" src="" alt=""></div>
